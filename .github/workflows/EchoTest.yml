name: EchoTest - Validate Dispatch Type

on:
  repository_dispatch:
    types:
      - test-type

jobs:
  validate-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Echo message from first workflow
        run: |
          echo "The first workflow dispatched Echotest workflow with the following payload:"
          echo "Event type: ${{ github.event.action }}"
          echo "Caller repository: ${{ github.event.client_payload.caller_repo }}"
          echo "Action ID: ${{ github.event.client_payload.action_id }}"
          echo "Branch: ${{ github.event.client_payload.branch_name }}"
          echo "SHA: ${{ github.event.client_payload.sha }}"